[project]
name = "svn-aether"

[build]
link_flags = "-lsqlite3 -lz -lutf8proc -lssl -lcrypto"

[[bin]]
name = "svn"
path = "ae/svn/main.ae"

[[bin]]
name = "svnadmin"
path = "ae/svnadmin/main.ae"

[[bin]]
name = "aether-svnserver"
path = "ae/svnserver/main.ae"

# --- test binaries -----------------------------------------------------------

[[bin]]
name = "test_error"
path = "ae/subr/test_error.ae"
extra_sources = ["ae/subr/error/shim.c"]
