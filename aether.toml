[project]
name = "svn-aether"

[build]
link_flags = "-lsqlite3 -lz -lutf8proc -lssl -lcrypto -lcjson -lcurl"

[[bin]]
name = "svn"
path = "ae/svn/main.ae"
extra_sources = ["ae/ra/shim.c", "ae/subr/io/shim.c", "ae/wc/db_shim.c", "ae/wc/pristine_shim.c", "ae/wc/checkout_shim.c", "ae/wc/status_shim.c"]

[[bin]]
name = "svnadmin"
path = "ae/svnadmin/main.ae"

[[bin]]
name = "aether-svnserver"
path = "ae/svnserver/main.ae"
extra_sources = ["ae/subr/sqlite/shim.c", "ae/subr/io/shim.c", "ae/subr/checksum/shim.c", "ae/subr/compress/shim.c", "ae/fs_fs/shim.c", "ae/fs_fs/txn_shim.c", "ae/fs_fs/rep_store_shim.c", "ae/fs_fs/commit_shim.c", "ae/repos/shim.c", "ae/svnserver/shim.c"]

[[bin]]
name = "svnae-seed"
path = "ae/svnserver/seed.ae"
extra_sources = ["ae/subr/sqlite/shim.c", "ae/subr/io/shim.c", "ae/subr/checksum/shim.c", "ae/subr/compress/shim.c", "ae/fs_fs/shim.c", "ae/fs_fs/txn_shim.c", "ae/fs_fs/rep_store_shim.c"]

[[bin]]
name = "test_ra"
path = "ae/ra/test_ra.ae"
extra_sources = ["ae/ra/shim.c"]

[[bin]]
name = "test_wc_db"
path = "ae/wc/test_db.ae"
extra_sources = ["ae/wc/db_shim.c", "ae/subr/io/shim.c"]

[[bin]]
name = "test_wc_pristine"
path = "ae/wc/test_pristine.ae"
extra_sources = ["ae/wc/db_shim.c", "ae/wc/pristine_shim.c", "ae/subr/io/shim.c"]

# --- test binaries -----------------------------------------------------------

[[bin]]
name = "test_error"
path = "ae/subr/test_error.ae"
extra_sources = ["ae/subr/error/shim.c"]

[[bin]]
name = "test_checksum"
path = "ae/subr/test_checksum.ae"
extra_sources = ["ae/subr/checksum/shim.c"]

[[bin]]
name = "test_compress"
path = "ae/subr/test_compress.ae"
extra_sources = ["ae/subr/compress/shim.c"]

[[bin]]
name = "test_io"
path = "ae/subr/test_io.ae"
extra_sources = ["ae/subr/io/shim.c"]

[[bin]]
name = "test_utf8"
path = "ae/subr/test_utf8.ae"
extra_sources = ["ae/subr/utf8/shim.c"]

[[bin]]
name = "test_svndiff"
path = "ae/delta/test_svndiff.ae"
extra_sources = ["ae/delta/svndiff/shim.c"]

[[bin]]
name = "test_sqlite"
path = "ae/subr/test_sqlite.ae"
extra_sources = ["ae/subr/sqlite/shim.c", "ae/subr/io/shim.c"]

[[bin]]
name = "test_repo"
path = "ae/fs_fs/test_repo.ae"
extra_sources = ["ae/subr/sqlite/shim.c", "ae/subr/io/shim.c", "ae/subr/checksum/shim.c", "ae/subr/compress/shim.c"]

[[bin]]
name = "test_revisions"
path = "ae/fs_fs/test_revisions.ae"
extra_sources = ["ae/subr/sqlite/shim.c", "ae/subr/io/shim.c", "ae/subr/checksum/shim.c", "ae/subr/compress/shim.c", "ae/fs_fs/shim.c"]

[[bin]]
name = "test_txn"
path = "ae/fs_fs/test_txn.ae"
extra_sources = ["ae/subr/sqlite/shim.c", "ae/subr/io/shim.c", "ae/subr/checksum/shim.c", "ae/subr/compress/shim.c", "ae/fs_fs/shim.c", "ae/fs_fs/txn_shim.c", "ae/fs_fs/rep_store_shim.c"]

[[bin]]
name = "test_repos"
path = "ae/repos/test_repos.ae"
extra_sources = ["ae/subr/sqlite/shim.c", "ae/subr/io/shim.c", "ae/subr/checksum/shim.c", "ae/subr/compress/shim.c", "ae/fs_fs/shim.c", "ae/fs_fs/txn_shim.c", "ae/fs_fs/rep_store_shim.c", "ae/repos/shim.c"]

[[bin]]
name = "test_xdelta"
path = "ae/delta/test_xdelta.ae"
extra_sources = ["ae/delta/svndiff/shim.c", "ae/delta/xdelta/shim.c"]
